<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <!-- Automatically redirect to index.html after 10 seconds -->
    <meta http-equiv="refresh" content="10;url=index.html">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 90%;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        p {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.2s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .timer {
            font-size: 14px;
            color: #95a5a6;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚧</div>
        <h1>Under Construction</h1>
        <p>We are currently working hard to bring you something amazing. This page is not quite ready yet.</p>
        
        <a href="index.html" class="btn">Return to Home Page</a>
        
        <div class="timer">
            You will be automatically redirected in <span id="countdown">10</span> seconds.
        </div>
    </div>

    <script>
        // Optional: Visual countdown timer text adjustment
        let timeLeft = 10;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            timeLeft--;
            countdownElement.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
            }
        }, 1000);
    </script>

</body>
</html>
